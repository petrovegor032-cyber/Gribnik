<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🍄 Грибник: Белые vs Мухоморы</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: system-ui, sans-serif; background: #1a3e1f; }
        #map { height: 100%; width: 100%; z-index: 1; }
        
        .panel {
            position: fixed;
            bottom: 16px;
            left: 12px;
            right: 12px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 12px 16px;
            color: #ffefb9;
            z-index: 1000;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            border: 1px solid #d4b87a;
            font-size: 14px;
        }
        .score {
            background: #2c2b1f;
            padding: 6px 16px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.3rem;
        }
        .stats {
            display: flex;
            gap: 12px;
            background: #1e2a1c;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
        }
        .status {
            background: #1e2a1c;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .led {
            width: 10px;
            height: 10px;
            border-radius: 10px;
            background-color: #f80;
        }
        .led.active {
            background-color: #8bc34a;
            animation: pulse 1s infinite;
        }
        button {
            background: #5a3e1b;
            border: none;
            color: #ffecb3;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        button:active { transform: scale(0.96); }
        .coords { font-family: monospace; font-size: 10px; background: #00000066; padding: 4px 10px; border-radius: 24px; }
        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(0.9);}
            100% { opacity: 1; transform: scale(1.2);}
        }
        @media (max-width: 550px) {
            .panel { flex-direction: column; align-items: stretch; }
            .stats { justify-content: center; }
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="panel">
    <div class="score">
        <span>🧺</span>
        <span id="totalScore">0</span>
    </div>
    <div class="stats">
        <span>🟤 <span id="whiteCount">0</span></span>
        <span>🔴🍄 <span id="amanitaCount">0</span></span>
    </div>
    <div class="status">
        <span class="led" id="gpsLed"></span>
        <span id="statusText">⛔ GPS выключен</span>
    </div>
    <button id="gpsBtn">🌍 Включить GPS</button>
    <button id="centerBtn">🎯 Центр</button>
    <div class="coords" id="coordDisplay">📍 ожидание</div>
</div>

<script>
    // ----- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ -----
    let map;
    let playerMarker = null;
    let accuracyCircle = null;
    let watchId = null;
    let currentLocation = null;
    let mushrooms = [];
    let nextId = 1;
    
    // Статистика
    let whiteCollected = 0;    // 🟤
    let amanitaCollected = 0;   // 🔴🍄
    let totalScore = 0;
    
    // Параметры генерации
    const COLLECT_RADIUS = 25;        // метров для сбора
    const MIN_DIST = 20;              // минимальное расстояние до гриба
    const MAX_DIST = 100;             // максимальное расстояние до гриба
    const FAR_DIST = 150;             // если гриб дальше 150м — удалить и создать новый
    const DESIRED_MUSHROOMS = 20;      // всего грибов на карте
    const START_RADIUS = 400;          // радиус разброса при старте (метры)
    
    // Таймер перерисовки
    let cleanupTimer = null;
    
    let crunchAudio = null;
    let audioEnabled = false;
    
    // ----- КАРТА -----
    function initMap() {
        map = L.map('map').setView([55.751244, 37.618423], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OSM',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);
    }
    
    // ----- ИКОНКИ -----
    // Белый гриб (коричневый кружок) + цифра +1
    function getWhiteIcon() {
        return L.divIcon({
            html: `<div style="background-color: #8B5A2B; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 14px; border: 2px solid #D4A76A; box-shadow: 0 2px 6px black;">+1</div>`,
            iconSize: [32, 32],
            className: 'white-mush',
            popupAnchor: [0, -16]
        });
    }
    
    // Мухомор (красный гриб) + цифра -1
    function getAmanitaIcon() {
        return L.divIcon({
            html: `<div style="background-color: #CC0000; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 14px; border: 2px solid #FF6666; box-shadow: 0 2px 6px black;">-1</div>`,
            iconSize: [32, 32],
            className: 'amanita-mush',
            popupAnchor: [0, -16]
        });
    }
    
    function getPlayerIcon() {
        return L.divIcon({
            html: `<div style="background-color: #2c6e2c; width: 28px; height: 28px; border-radius: 50%; border: 3px solid #ffd966; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 0 10px gold;">🧺</div>`,
            iconSize: [28, 28]
        });
    }
    
    // ----- РАССТОЯНИЕ (метры) -----
    function distance(lat1, lng1, lat2, lng2) {
        const R = 6371000;
        const φ1 = lat1 * Math.PI/180;
        const φ2 = lat2 * Math.PI/180;
        const Δφ = (lat2-lat1) * Math.PI/180;
        const Δλ = (lng2-lng1) * Math.PI/180;
        const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
    
    // ----- ГЕНЕРАЦИЯ ГРИБА В РАДИУСЕ ОТ ТОЧКИ -----
    function generateMushroomNear(lat, lng, minDist, maxDist) {
        const dist = minDist + Math.random() * (maxDist - minDist);
        const angle = Math.random() * 2 * Math.PI;
        const deltaLat = (dist * Math.cos(angle)) / 111320;
        const deltaLng = (dist * Math.sin(angle)) / (111320 * Math.cos(lat * Math.PI/180));
        
        let newLat = lat + deltaLat;
        let newLng = lng + deltaLng;
        
        newLat = Math.min(90, Math.max(-90, newLat));
        newLng = Math.min(180, Math.max(-180, newLng));
        
        // 30% шанс мухомора, 70% белый
        const isAmanita = Math.random() < 0.3;
        
        return { lat: newLat, lng: newLng, type: isAmanita ? 'amanita' : 'white' };
    }
    
    // ----- ДОБАВИТЬ ГРИБ НА КАРТУ -----
    function addMushroom(lat, lng, type) {
        const icon = type === 'white' ? getWhiteIcon() : getAmanitaIcon();
        const marker = L.marker([lat, lng], { icon }).addTo(map);
        const popupText = type === 'white' ? '🟤 Белый гриб +1' : '🔴🍄 Мухомор -1';
        marker.bindPopup(popupText);
        mushrooms.push({ id: nextId++, marker, lat, lng, type });
    }
    
    function removeMushroom(m) {
        if (m.marker) map.removeLayer(m.marker);
        const idx = mushrooms.findIndex(x => x.id === m.id);
        if (idx !== -1) mushrooms.splice(idx, 1);
    }
    
    // ----- ОБНОВЛЕНИЕ СТАТИСТИКИ -----
    function updateStats() {
        document.getElementById('totalScore').innerText = totalScore;
        document.getElementById('whiteCount').innerText = whiteCollected;
        document.getElementById('amanitaCount').innerText = amanitaCollected;
    }
    
    // ----- СБОР ГРИБОВ -----
    function collectMushrooms(lat, lng) {
        let collected = 0;
        for (let i = mushrooms.length-1; i >= 0; i--) {
            const m = mushrooms[i];
            const dist = distance(lat, lng, m.lat, m.lng);
            if (dist <= COLLECT_RADIUS) {
                removeMushroom(m);
                collected++;
                
                if (m.type === 'white') {
                    totalScore++;
                    whiteCollected++;
                    document.getElementById('statusText').innerHTML = '🟤 +1 белый гриб!';
                } else {
                    totalScore--;
                    amanitaCollected++;
                    document.getElementById('statusText').innerHTML = '🔴🍄 -1 мухомор!';
                }
                updateStats();
                
                if (crunchAudio && audioEnabled) {
                    crunchAudio.play();
                }
            }
        }
        
        if (collected > 0 && currentLocation) {
            // Сразу добавить новые грибы вместо собранных
            for (let i = 0; i < collected; i++) {
                const newMush = generateMushroomNear(currentLocation.lat, currentLocation.lng, MIN_DIST, MAX_DIST);
                addMushroom(newMush.lat, newMush.lng, newMush.type);
            }
        }
        
        if (collected > 0) {
            setTimeout(() => {
                if (document.getElementById('statusText').innerHTML.includes('+') || 
                    document.getElementById('statusText').innerHTML.includes('-'))
                    document.getElementById('statusText').innerHTML = '🌿 Ищи дальше';
            }, 1500);
        }
    }
    
    // ----- ОЧИСТКА ДАЛЁКИХ ГРИБОВ И ДОБАВЛЕНИЕ НОВЫХ (таймер)-----
    function cleanupFarMushrooms() {
        if (!currentLocation) return;
        
        let removed = 0;
        for (let i = mushrooms.length-1; i >= 0; i--) {
            const m = mushrooms[i];
            const dist = distance(currentLocation.lat, currentLocation.lng, m.lat, m.lng);
            if (dist > FAR_DIST) {
                removeMushroom(m);
                removed++;
            }
        }
        
        // Добавить новые грибы до нужного количества
        let needed = DESIRED_MUSHROOMS - mushrooms.length;
        for (let i = 0; i < needed; i++) {
            const newMush = generateMushroomNear(currentLocation.lat, currentLocation.lng, MIN_DIST, MAX_DIST);
            addMushroom(newMush.lat, newMush.lng, newMush.type);
        }
        
        if (removed > 0) {
            console.log(`Очищено ${removed} дальних грибов, добавлено ${needed} новых`);
        }
    }
    
    // ----- СТАРТОВАЯ ГЕНЕРАЦИЯ ГРИБОВ (россыпь на 300-500 метров)-----
    function initMushroomsWide(lat, lng) {
        // Очищаем старые
        for (let m of mushrooms) {
            if (m.marker) map.removeLayer(m.marker);
        }
        mushrooms = [];
        
        // Генерируем грибы в радиусе от 50 до 500 метров
        for (let i = 0; i < DESIRED_MUSHROOMS; i++) {
            const range = 50 + Math.random() * START_RADIUS;
            const newMush = generateMushroomNear(lat, lng, range, range + 30);
            addMushroom(newMush.lat, newMush.lng, newMush.type);
        }
        
        console.log(`Создано ${mushrooms.length} грибов в радиусе до ${START_RADIUS}м`);
    }
    
    // ----- ОБНОВЛЕНИЕ КАРТЫ И ПОЗИЦИИ -----
    function updatePlayer(lat, lng, accuracy) {
        if (playerMarker) map.removeLayer(playerMarker);
        if (accuracyCircle) map.removeLayer(accuracyCircle);
        
        playerMarker = L.marker([lat, lng], { icon: getPlayerIcon() }).addTo(map);
        playerMarker.bindPopup(`🧑‍🌾 Вы здесь | Очков: ${totalScore}`);
        
        if (accuracy < 300) {
            accuracyCircle = L.circle([lat, lng], { 
                radius: accuracy, 
                color: '#8bc34a', 
                weight: 1, 
                fillOpacity: 0.15 
            }).addTo(map);
        }
        
        document.getElementById('coordDisplay').innerHTML = `${lat.toFixed(5)} , ${lng.toFixed(5)}  ±${Math.round(accuracy)}м`;
        document.getElementById('gpsLed').classList.add('active');
    }
    
    function onLocation(position) {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;
        const accuracy = position.coords.accuracy;
        
        const firstFix = !currentLocation;
        currentLocation = { lat, lng, accuracy, timestamp: Date.now() };
        
        updatePlayer(lat, lng, accuracy);
        
        // Сбор грибов
        collectMushrooms(lat, lng);
        
        // Если первый раз — широкая генерация
        if (firstFix) {
            initMushroomsWide(lat, lng);
        }
    }
    
    // ----- ЗАПУСК GPS -----
    function startGPS() {
        if (!navigator.geolocation) {
            alert("Ваш браузер не поддерживает геолокацию");
            return;
        }
        
        document.getElementById('statusText').innerHTML = '🟡 Запрос разрешения...';
        
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                if (watchId) navigator.geolocation.clearWatch(watchId);
                watchId = navigator.geolocation.watchPosition(
                    onLocation,
                    (err) => {
                        console.error(err);
                        document.getElementById('statusText').innerHTML = '❌ Ошибка GPS';
                        document.getElementById('gpsLed').classList.remove('active');
                    },
                    { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
                );
                onLocation(pos);
                
                // Запускаем таймер очистки дальних грибов (каждые 10 секунд)
                if (cleanupTimer) clearInterval(cleanupTimer);
                cleanupTimer = setInterval(() => {
                    if (currentLocation) {
                        cleanupFarMushrooms();
                    }
                }, 10000);
            },
            (err) => {
                console.error("GPS denied:", err);
                document.getElementById('statusText').innerHTML = '⛔ Доступ запрещён';
                document.getElementById('gpsLed').classList.remove('active');
                alert("Разрешите доступ к геолокации в настройках браузера и нажмите кнопку снова.");
            },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    }
    
    // ----- ЗВУК (хруст) -----
    function initAudio() {
        if (audioEnabled) return;
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const ctx = new AudioContext();
            const buffer = ctx.createBuffer(1, 8000, 44100);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < 8000; i++) {
                let t = i / 44100;
                let env = Math.exp(-t * 20);
                data[i] = (Math.sin(2 * Math.PI * 400 * t) + (Math.random() - 0.5) * 0.5) * env * 0.3;
            }
            const source = ctx.createBufferSource();
            source.buffer = buffer;
            source.connect(ctx.destination);
            crunchAudio = {
                play: () => {
                    const newCtx = new AudioContext();
                    const newSource = newCtx.createBufferSource();
                    newSource.buffer = buffer;
                    newSource.connect(newCtx.destination);
                    newSource.start();
                    newCtx.resume();
                }
            };
        } catch(e) {
            crunchAudio = { play: () => console.log("хруст") };
        }
        audioEnabled = true;
    }
    
    // ----- ЦЕНТР -----
    function centerOnMe() {
        if (currentLocation) {
            map.setView([currentLocation.lat, currentLocation.lng], 17);
            if (playerMarker) playerMarker.openPopup();
        } else {
            alert("GPS не активен. Нажмите 'Включить GPS'");
        }
    }
    
    // ----- СТАРТ -----
    window.onload = () => {
        initMap();
        
        // Несколько стартовых грибов для красоты (временные, потом перезапишутся)
        for (let i = 0; i < 8; i++) {
            let fake = generateMushroomNear(55.751244, 37.618423, 50, 400);
            addMushroom(fake.lat, fake.lng, fake.type);
        }
        
        document.getElementById('gpsBtn').onclick = () => {
            startGPS();
        };
        document.getElementById('centerBtn').onclick = centerOnMe;
        
        // Звук по первому касанию
        const enableAudio = () => {
            initAudio();
            document.removeEventListener('touchstart', enableAudio);
            document.removeEventListener('click', enableAudio);
        };
        document.addEventListener('touchstart', enableAudio);
        document.addEventListener('click', enableAudio);
    };
    
    window.onbeforeunload = () => {
        if (watchId) navigator.geolocation.clearWatch(watchId);
        if (cleanupTimer) clearInterval(cleanupTimer);
    };
</script>
</body>
</html>
